version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: expense_mysql
    restart: always
    environment:
      MYSQL_DATABASE: expense_db
      MYSQL_ROOT_PASSWORD: your_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: expense_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db

volumes:
  mysql_data: